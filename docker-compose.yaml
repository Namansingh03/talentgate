services:

  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=myPassword
      - POSTGRES_DB=myDb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
